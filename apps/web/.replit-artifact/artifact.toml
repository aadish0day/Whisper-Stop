kind = "web"
previewPath = "/"
title = "WhisperStop"
version = "1.0.0"
id = "artifacts/whisperstop"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25155

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web", "run", "build" ]
serve = "static"
publicDir = "apps/web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25155"
BASE_PATH = "/"
