services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whisperstop
      POSTGRES_USER: whisperstop
      POSTGRES_PASSWORD: whisperstop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisperstop -d whisperstop"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 8080
      NODE_ENV: development
      DATABASE_URL: postgres://whisperstop:whisperstop@postgres:5432/whisperstop
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      PORT: 5173
      BASE_PATH: /
    ports:
      - "5173:5173"

volumes:
  postgres_data:
