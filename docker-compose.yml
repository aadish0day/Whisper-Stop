services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_DB: whisperstop
      POSTGRES_USER: whisperstop
      POSTGRES_PASSWORD: whisperstop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisperstop -d whisperstop"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      network: host
    network_mode: host
    environment:
      PORT: 8080
      NODE_ENV: development
      # With host networking, reach postgres on localhost
      DATABASE_URL: postgres://whisperstop:whisperstop@localhost:5432/whisperstop
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      network: host
    network_mode: host
    environment:
      PORT: 5173
      BASE_PATH: /

volumes:
  postgres_data:
